<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled</title>

  <!-- Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){
      w[l]=w[l]||[];
      w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
      var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),
          dl=l!='dataLayer' ? '&l='+l : '';
      j.async=true;
      j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
      f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-K2QGFTBD');
  </script>
  <!-- End GTM -->

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      text-align: center;
    }

    .box {
      background: white;
      padding: 30px;
      width: 420px;
      margin: auto;
      border-radius: 10px;
    }

    h1 {
      color: #dc3545;
    }

    p {
      color: #333;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      text-decoration: none;
      border-radius: 5px;
      color: white;
    }

    .retry {
      background: #007bff;
    }

    .home {
      background: #6c757d;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<!-- GTM noscript -->
<noscript>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K2QGFTBD"
  height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<div class="box">

  <h1>Payment Cancelled</h1>

  <p>Your transaction was not completed.</p>

  <p>
    Order ID:
    <strong id="order-id">-</strong>
  </p>

  <p>
    Amount:
    <strong>$<span id="amount">0</span></strong>
  </p>

  <a class="btn retry" href="payment.html">Retry Payment</a>
  <a class="btn home" href="index.html">Go Home</a>

</div>

<script>

  window.dataLayer = window.dataLayer || [];

  const params = new URLSearchParams(window.location.search);

  const orderId = params.get("order_id") || "UNKNOWN";

  const amount = params.get("amount") || "0";

  document.getElementById("order-id").innerText = orderId;
  document.getElementById("amount").innerText = amount;

  // CLEAR ECOMMERCE OBJECT FIRST
  dataLayer.push({ ecommerce: null });

  // PAGE VIEW EVENT
  dataLayer.push({
    event: "payment_cancelled_page_view",
    ecommerce: {
      transaction_id: orderId,
      value: Number(amount)
    }
  });

</script>

</body>
</html>
