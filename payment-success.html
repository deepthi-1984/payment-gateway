<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Payment Successful</title>

  <!-- Google Tag Manager -->
  <script>
  (function(w,d,s,l,i){
    w[l]=w[l]||[];
    w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
    var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),
        dl=l!='dataLayer' ? '&l='+l : '';
    j.async=true;
    j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
    f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-K2QGFTBD');
  </script>

</head>

<body>

  <h1>Payment Successful ✅</h1>

  <p id="result"></p>

  <a href="index.html">
    <button>Go to Home</button>
  </a>

  <nav>
    <a href="index.html">Home</a> |
    <a href="products.html">Products</a> |
    <a href="product-detail.html">Product Detail</a> |
    <a href="cart.html">Cart</a> |
    <a href="checkout.html">Checkout</a>
  </nav>

  <hr>

<script>

window.dataLayer = window.dataLayer || [];

// GET ORDER ID
const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id") || "unknown_order";

// GET CART FROM LOCAL STORAGE
const cartItems = JSON.parse(localStorage.getItem("cart")) || [];

// CALCULATE TOTAL
let totalValue = 0;

cartItems.forEach(function(item) {
  totalValue += item.price * item.quantity;
});

// SAFETY CHECK
if (cartItems.length === 0) {

  console.warn("No items in cart for purchase event");

  document.getElementById("result").innerText =
    "No items found in cart.";

} else {

  // PURCHASE EVENT
  dataLayer.push({
    event: "purchase",
    ecommerce: {
      transaction_id: orderId,
      value: totalValue,
      currency: "USD",
      items: cartItems
    }
  });

  // UI MESSAGE
  document.getElementById("result").innerText =
    `Order ${orderId} completed successfully`;

  // OPTIONAL: CLEAR CART AFTER PURCHASE
  localStorage.removeItem("cart");

}

</script>

</body>
</html>
